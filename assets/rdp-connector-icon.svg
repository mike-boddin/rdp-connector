<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="monitorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f2a5c"/>
      <stop offset="100%" stop-color="#0a1c3e"/>
    </linearGradient>
    <linearGradient id="plugGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a7bd5"/>
      <stop offset="100%" stop-color="#1d5cb8"/>
    </linearGradient>
    <linearGradient id="glowH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3a7bd5" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#3a7bd5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3a7bd5" stop-opacity="0"/>
    </linearGradient>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Monitor body -->
  <rect x="56" y="72" width="400" height="258" rx="22" fill="url(#monitorGrad)" stroke="#2a3a5c" stroke-width="2"/>

  <!-- Screen bezel -->
  <rect x="74" y="88" width="364" height="224" rx="10" fill="url(#screenGrad)"/>

  <!-- Subtle scan lines -->
  <rect x="74" y="88"  width="364" height="2" fill="#3a7bd5" opacity="0.15"/>
  <rect x="74" y="102" width="364" height="1" fill="#3a7bd5" opacity="0.07"/>
  <rect x="74" y="116" width="364" height="1" fill="#3a7bd5" opacity="0.05"/>

  <!-- Horizontal screen glow -->
  <rect x="74" y="182" width="364" height="22" fill="url(#glowH)" opacity="0.65"/>

  <!-- ── Plug icon centred on screen ── -->
  <!-- Plug body -->
  <rect x="238" y="110" width="36" height="54" rx="9" fill="url(#plugGrad)" stroke="#5a9ff0" stroke-width="1.25"/>
  <!-- Plug pins -->
  <rect x="246" y="97"  width="8"  height="14" rx="3" fill="#8bbfff" stroke="#5a9ff0" stroke-width="0.75"/>
  <rect x="258" y="97"  width="8"  height="14" rx="3" fill="#8bbfff" stroke="#5a9ff0" stroke-width="0.75"/>
  <!-- Cord -->
  <path d="M256 164 Q256 178 256 188" fill="none" stroke="#3a7bd5" stroke-width="5" stroke-linecap="round"/>
  <!-- Socket outline -->
  <rect x="230" y="188" width="52" height="38" rx="9" fill="none" stroke="#3a7bd5" stroke-width="1.75" stroke-dasharray="4 3"/>
  <!-- Socket pin holes -->
  <rect x="238" y="197" width="8"  height="12" rx="3" fill="#1d5cb8" stroke="#2a6fd4" stroke-width="0.75"/>
  <rect x="258" y="197" width="8"  height="12" rx="3" fill="#1d5cb8" stroke="#2a6fd4" stroke-width="0.75"/>

  <!-- Connection spark dots -->
  <circle cx="224" cy="207" r="3" fill="#3a7bd5" opacity="0.75" filter="url(#softglow)"/>
  <circle cx="288" cy="207" r="3" fill="#3a7bd5" opacity="0.75" filter="url(#softglow)"/>

  <!-- Signal arcs left -->
  <path d="M210 168 Q194 200 210 232" fill="none" stroke="#3a7bd5" stroke-width="2"   stroke-linecap="round" opacity="0.65"/>
  <path d="M194 156 Q172 200 194 244" fill="none" stroke="#3a7bd5" stroke-width="1.25" stroke-linecap="round" opacity="0.35"/>
  <!-- Signal arcs right -->
  <path d="M302 168 Q318 200 302 232" fill="none" stroke="#3a7bd5" stroke-width="2"   stroke-linecap="round" opacity="0.65"/>
  <path d="M318 156 Q340 200 318 244" fill="none" stroke="#3a7bd5" stroke-width="1.25" stroke-linecap="round" opacity="0.35"/>

  <!-- LED dot top bezel -->
  <circle cx="256" cy="82" r="4" fill="#3a7bd5" opacity="0.85" filter="url(#softglow)"/>

  <!-- Subtle corner rivets -->
  <circle cx="80"  cy="94"  r="2.5" fill="#2a3a5c" opacity="0.5"/>
  <circle cx="432" cy="94"  r="2.5" fill="#2a3a5c" opacity="0.5"/>
  <circle cx="80"  cy="306" r="2.5" fill="#2a3a5c" opacity="0.5"/>
  <circle cx="432" cy="306" r="2.5" fill="#2a3a5c" opacity="0.5"/>

  <!-- Stand neck -->
  <rect x="242" y="330" width="28" height="30" rx="5" fill="#16203a" stroke="#2a3a5c" stroke-width="1.25"/>
  <!-- Base -->
  <rect x="174" y="358" width="164" height="18" rx="9" fill="#1a2540" stroke="#2a3a5c" stroke-width="1.25"/>
</svg>
