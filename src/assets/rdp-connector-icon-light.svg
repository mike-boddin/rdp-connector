<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e6ee6"/>
      <stop offset="100%" stop-color="#1444b8"/>
    </linearGradient>
    <linearGradient id="monitorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dce8ff"/>
      <stop offset="100%" stop-color="#b4ccf7"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#1a3a80"/>
      <stop offset="100%" stop-color="#0d2255"/>
    </linearGradient>
    <linearGradient id="plugGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8daff"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d8f8"/>
      <stop offset="100%" stop-color="#9ab8ef"/>
    </linearGradient>
    <linearGradient id="glowH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4d9fff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#4d9fff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4d9fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0a1e6e" flood-opacity="0.4"/>
    </filter>
    <filter id="glowblue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Full-bleed rounded background 
  <rect width="512" height="512" rx="50" fill="url(#bgGrad)"/>-->

  <!-- Monitor body -->
  <rect x="44" y="90" width="424" height="272" rx="20" fill="url(#monitorGrad)" filter="url(#shadow)"/>

  <!-- Screen -->
  <rect x="64" y="108" width="384" height="220" rx="10" fill="url(#screenGrad)"/>

  <!-- Scan line shimmer -->
  <rect x="64" y="108" width="384" height="3"   fill="#4d9fff" opacity="0.25"/>
  <rect x="64" y="124" width="384" height="1.5" fill="#4d9fff" opacity="0.10"/>

  <!-- Screen glow bar -->
  <rect x="64" y="200" width="384" height="28" fill="url(#glowH)" opacity="0.7"/>

  <!-- Plug body -->
  <rect x="228" y="122" width="56" height="80" rx="12" fill="url(#plugGrad)" filter="url(#shadow)"/>

  <!-- Plug pins -->
  <rect x="240" y="105" width="11" height="20" rx="4" fill="#e8f0ff" stroke="#b4ccff" stroke-width="1"/>
  <rect x="261" y="105" width="11" height="20" rx="4" fill="#e8f0ff" stroke="#b4ccff" stroke-width="1"/>

  <!-- Cord -->
  <path d="M256 202 Q256 220 256 235" fill="none" stroke="#c8daff" stroke-width="7" stroke-linecap="round"/>

  <!-- Socket outline -->
  <rect x="218" y="235" width="76" height="52" rx="12" fill="#4d9fff" opacity="0.08"/>
  <rect x="218" y="235" width="76" height="52" rx="12" fill="none" stroke="#7ab2ff" stroke-width="2.5" stroke-dasharray="5 4"/>
  <!-- Socket pin holes -->
  <rect x="231" y="247" width="11" height="16" rx="4" fill="#1a3a80" stroke="#2a5ccc" stroke-width="1"/>
  <rect x="270" y="247" width="11" height="16" rx="4" fill="#1a3a80" stroke="#2a5ccc" stroke-width="1"/>

  <!-- Glow dots -->
  <circle cx="214" cy="258" r="4" fill="#7ab2ff" opacity="0.9" filter="url(#glowblue)"/>
  <circle cx="298" cy="258" r="4" fill="#7ab2ff" opacity="0.9" filter="url(#glowblue)"/>

  <!-- Signal arcs left -->
  <path d="M196 188 Q176 218 196 248" fill="none" stroke="#e0ecff" stroke-width="3"   stroke-linecap="round" opacity="0.8"/>
  <path d="M176 174 Q148 218 176 262" fill="none" stroke="#c0d8ff" stroke-width="2"   stroke-linecap="round" opacity="0.55"/>
  <path d="M156 160 Q120 218 156 276" fill="none" stroke="#a0c0ff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Signal arcs right -->
  <path d="M316 188 Q336 218 316 248" fill="none" stroke="#e0ecff" stroke-width="3"   stroke-linecap="round" opacity="0.8"/>
  <path d="M336 174 Q364 218 336 262" fill="none" stroke="#c0d8ff" stroke-width="2"   stroke-linecap="round" opacity="0.55"/>
  <path d="M356 160 Q392 218 356 276" fill="none" stroke="#a0c0ff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Bezel LED dot -->
  <circle cx="256" cy="99" r="5" fill="#7ab2ff" opacity="0.9" filter="url(#glowblue)"/>

  <!-- Stand neck -->
  <rect x="238" y="362" width="36" height="36" rx="6" fill="url(#baseGrad)"/>
  <!-- Stand base -->
  <rect x="172" y="395" width="168" height="22" rx="11" fill="url(#baseGrad)" filter="url(#shadow)"/>

  <!-- RDP label 
  <text
    x="256" y="455"
    text-anchor="middle"
    font-family="'Arial Rounded MT Bold', 'Nunito', 'SF Pro Rounded', system-ui, sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="2"
    fill="#ffffff"
    opacity="0.92"
  >RDP</text>-->
</svg>
